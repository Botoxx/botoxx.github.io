baseURL = "https://cloudgeist.cloud/"
languageCode = "en-us"
title = "Botond Geiszt"
enableEmoji = true
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[taxonomies]
  tag = "tags"

[outputs]
  home = ["HTML", "RSS"]
  section = ["HTML", "RSS"]

[params]
  description = "Cloud Engineer · AI integration · Hungary. Personal site and notes by Botond Geiszt."
  author = "Botond Geiszt"
  jobtitle = "Cloud Engineer · AI Integrator"
  motto = "Cloud-native infrastructure and AI agents in production."
  github = "https://github.com/botoxx"
  linkedin = "https://www.linkedin.com/in/botond-geiszt-82b91b167/"
  email = "botond@cloudgeist.cloud"
  ogImage = "/og-cover.png"

[markup]
  [markup.goldmark.renderer]
    unsafe = true
  [markup.highlight]
    noClasses = false
    style = "github-dark"
    lineNos = false
    tabWidth = 2
  [markup.tableOfContents]
    startLevel = 2
    endLevel = 4
