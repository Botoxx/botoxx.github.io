{{- $title := cond .IsHome .Site.Title (printf "%s | %s" .Title .Site.Title) -}}
{{- $desc := cond (ne .Description "") .Description .Site.Params.description -}}
{{- $img := absURL (default "/og-cover.png" .Site.Params.ogImage) -}}

<meta property="og:type" content="{{ if .IsPage }}article{{ else }}website{{ end }}">
<meta property="og:title" content="{{ $title }}">
<meta property="og:description" content="{{ $desc }}">
<meta property="og:url" content="{{ .Permalink }}">
<meta property="og:site_name" content="{{ .Site.Title }}">
<meta property="og:image" content="{{ $img }}">
<meta property="og:locale" content="en_US">

<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:title" content="{{ $title }}">
<meta name="twitter:description" content="{{ $desc }}">
<meta name="twitter:image" content="{{ $img }}">

{{- if .IsHome }}
<script type="application/ld+json">
{
  "@context": "https://schema.org",
  "@type": "Person",
  "name": "{{ .Site.Params.author }}",
  "jobTitle": "{{ .Site.Params.jobtitle }}",
  "url": "{{ .Site.BaseURL }}",
  "email": "mailto:{{ .Site.Params.email }}",
  "sameAs": [
    "{{ .Site.Params.github }}",
    "{{ .Site.Params.linkedin }}"
  ],
  "worksFor": { "@type": "Organization", "name": "ApexLab" },
  "address": { "@type": "PostalAddress", "addressLocality": "Budapest", "addressCountry": "HU" }
}
</script>
{{- end }}
