<header class="header">
    <div class="container">
        <div class="profile">
            <div class="profile-image">
                <span class="profile-icon"><i class="fas fa-user-circle"></i></span>
            </div>
            <div class="profile-content">
                <h1>{{ .Site.Title }}</h1>
                <h2>{{ .Site.Params.jobtitle }}</h2>
                <p class="profile-motto">One can build a system that works. One can architect a system that endures scale, failure, attack, cost pressure and human error.</p>
                <div class="profile-links">
                    <a href="{{ .Site.Params.github }}" target="_blank"><i class="fab fa-github"></i> GitHub</a>
                    <a href="{{ .Site.Params.linkedin }}" target="_blank"><i class="fab fa-linkedin"></i> LinkedIn</a>
                    <a href="mailto:{{ .Site.Params.email }}"><i class="fas fa-envelope"></i> Email</a>
                </div>
            </div>
        </div>
    </div>
</header>
